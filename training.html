<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reviewer Training and Reference Materials | Documentation Review</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{
  --bg:#0A0A0A;--surface:#111111;--surface2:#161616;
  --text:#E8E8E8;--muted:#888888;--muted-soft:#515151;--rule:#222222;
  --accent:#B89040;--accent-dim:#7A5E28;
  --ready:#1E5C35;--ready-text:#4A9E68;--stop:#7A1E1E;--stop-text:#B85858;
  --review-text:#B88C38;--progress-bg:#181818;
}
html,body{overflow-x:hidden;width:100%;max-width:100%;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

.site-header{border-bottom:1px solid var(--rule);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;background:var(--bg);z-index:200;}
.logo{font-family:'JetBrains Mono','Courier New',monospace;font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);text-decoration:none;}
.badge{font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-soft);border:1px solid var(--rule);padding:4px 10px;}
.progress-bar-wrap{height:2px;background:var(--progress-bg);position:sticky;top:52px;z-index:199;}
.progress-bar-fill{height:2px;background:linear-gradient(90deg,var(--accent-dim),var(--accent));width:0%;transition:width .4s ease;}
.hero{border-bottom:1px solid var(--rule);padding:48px 32px 36px;max-width:900px;margin:0 auto;width:100%;}
.eyebrow{font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:10px;}
.hero h1{font-size:24px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.25;}
.hero p{font-size:13px;color:var(--muted);max-width:600px;line-height:1.7;}
.access-note{margin-top:16px;border:1px solid var(--rule);border-left:2px solid var(--accent-dim);padding:10px 14px;font-size:12.5px;color:var(--muted);background:var(--surface);max-width:620px;}
.progress-tracker{background:var(--surface);border:1px solid var(--rule);padding:14px 20px;max-width:900px;margin:20px auto 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;width:100%;}
.progress-tracker-label{font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-dim);flex-shrink:0;}
.module-dots{display:flex;gap:6px;flex-wrap:wrap;flex:1;min-width:0;}
.module-dot{width:28px;height:28px;border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono','Courier New',monospace;font-size:8px;color:var(--muted-soft);cursor:pointer;transition:all .2s;flex-shrink:0;}
.module-dot:hover{border-color:var(--accent-dim);color:var(--accent-dim);}
.module-dot.completed{border-color:var(--ready);color:var(--ready-text);background:rgba(30,92,53,.08);}
.progress-pct{font-family:'JetBrains Mono','Courier New',monospace;font-size:10px;color:var(--muted-soft);white-space:nowrap;}
.container{max-width:900px;margin:0 auto;padding:0 32px 60px;width:100%;}
.section-head{font-size:9px;font-family:'JetBrains Mono','Courier New',monospace;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-dim);margin:36px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--rule);}
.doc-grid{border:1px solid var(--rule);overflow:hidden;}
.doc-card{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--rule);gap:16px;}
.doc-card:last-child{border-bottom:none;}
.doc-card:hover{background:var(--surface2);}
.doc-info{flex:1;min-width:0;}
.doc-label{font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:3px;}
.doc-label span{color:var(--muted-soft);margin-left:8px;font-weight:400;}
.doc-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:2px;}
.doc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:4px;}
.doc-note{font-size:11px;color:var(--muted-soft);font-style:italic;line-height:1.4;}
.btn-dl{font-family:'JetBrains Mono','Courier New',monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:#0A0A0A;background:var(--accent);padding:9px 14px;text-decoration:none;white-space:nowrap;flex-shrink:0;border:none;cursor:pointer;display:inline-block;margin-top:2px;}
.btn-dl:hover{background:#9A6E28;}
.btn-pending{font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-soft);border:1px solid var(--rule);padding:8px 11px;white-space:nowrap;flex-shrink:0;margin-top:2px;background:transparent;cursor:default;}
.deploy-note{font-size:11.5px;color:var(--muted-soft);font-style:italic;padding:10px 16px;border-top:1px solid var(--rule);background:var(--surface);}
.module{border:1px solid var(--rule);overflow:hidden;margin-bottom:8px;transition:border-color .2s;}
.module.active-module{border-color:var(--accent-dim); box-shadow: 0 0 0 3px rgba(184,144,64,0.25); animation: moduleActivePulse 2.5s ease-in-out infinite alternate;}
@keyframes moduleActivePulse { from { box-shadow: 0 0 0 2px rgba(184,144,64,0.3); } to { box-shadow: 0 0 0 6px rgba(184,144,64,0.12); } }

.module-hdr{padding:12px 16px;background:var(--surface2);display:flex;justify-content:space-between;align-items:center;cursor:pointer;-webkit-tap-highlight-color:rgba(184,144,64,.2);touch-action:manipulation;min-height:52px;transition:background .15s;-webkit-user-select:none;user-select:none;width:100%;text-align:left;border:none;font-family:inherit;color:inherit;}
.module-hdr:hover{background:#1A1A1A;}
.module-num{font-family:'JetBrains Mono','Courier New',monospace;font-size:8px;letter-spacing:.14em;color:var(--accent-dim);margin-right:10px;}
.module-title{font-size:13px;font-weight:600;color:var(--text);}
.module-hdr-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:8px;}
.module-status{font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;padding:3px 7px;border:1px solid;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;}
.module-status.not-started{border-color:var(--rule);color:var(--muted-soft);}
.module-status.in-progress{border-color:var(--accent-dim);color:var(--accent-dim);}
.module-status.completed{border-color:var(--ready);color:var(--ready-text);background:rgba(30,92,53,.06);}
.module-toggle{font-family:'JetBrains Mono','Courier New',monospace;font-size:9px;color:var(--muted-soft);white-space:nowrap;}
.module-body{display:none;background:var(--surface);}
.module-body.open{display:block;}

/* Enhanced Animations */
.module-body { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.quiz-option { transition: all 0.25s cubic-bezier(0.4, 0.0, 0.2, 1); }
.quiz-option:hover:not(.disabled) { transform: translateX(10px); box-shadow: 0 6px 16px rgba(184, 144, 64, 0.18); }

.complete-icon { animation: completePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
@keyframes completePop {
  0% { transform: scale(0) rotate(-15deg); opacity: 0; }
  55% { transform: scale(1.28) rotate(8deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* Rest of your original CSS */
.rn{border-left:2px solid var(--accent-dim);padding:8px 13px;background:var(--surface2);margin:10px 0;}
.rn-label{font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-dim);margin-bottom:4px;}
.rn p{font-size:12.5px;color:var(--muted);margin:0;line-height:1.6;}
.reviewer-reminder{border-left:2px solid var(--rule);padding:7px 14px;margin:14px 0;}
.reviewer-reminder-label{font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-soft);margin-bottom:3px;}
.reviewer-reminder p{font-size:12px;color:var(--muted-soft);font-style:italic;margin:0;line-height:1.5;}
.pause-review{border:1px solid var(--rule);padding:14px 16px;margin:18px 0;background:var(--surface2);}
.pause-review-label{font-family:'JetBrains Mono','Courier New',monospace;font-size:7.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-soft);margin-bottom:10px;}
.pause-review p{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
.pause-review ul{list-style:none;padding:0;margin:0;}
.pause-review ul li{font-size:12px;color:var(--muted);padding:3px 0 3px 14px;position:relative;}
.pause-review ul li::before{content:"—";position:absolute;left:0;color:var(--muted-soft);}
.before{background:rgba(122,30,30,.04);border-left:2px solid var(--stop);padding:9px 13px;margin-bottom:4px;}
.after{background:rgba(30,92,53,.04);border-left:2px solid var(--ready);padding:9px 13px;}
.gap-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.gap-box{border:1px solid var(--rule);padding:10px 12px;background:var(--surface2);}
.gap-lbl{font-family:'JetBrains Mono','Courier New',monospace;font-size:7px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;}
.gap-lbl.red{color:var(--stop-text);}.gap-lbl.gold{color:var(--accent-dim);}
.gap-text{font-size:12px;color:var(--muted
