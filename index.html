<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Justification Review Standard</title>
<meta name="description" content="A pre-save documentation standard.">

<style>
body {
  margin: 0;
  background: #000;
  color: #EAEAEA;
  font-family: Georgia, "Times New Roman", serif;
  line-height: 1.6;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 80px 40px 80px 120px;
  position: relative;
}

.container::before {
  content: '';
  position: absolute;
  left: 80px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: #C8A24A;
}

/* Title */
.title {
  font-size: 20px;
  color: #C8A24A;
  margin-bottom: 6px;
}

/* JRS with TM */
.jrs {
  font-size: 44px;
  font-weight: 400;
  letter-spacing: -0.2px;
  margin-bottom: 32px;
  color: #C8A24A;
}

.tm {
  font-size: 12px;
  vertical-align: super;
  margin-left: 2px;
}

/* Sections */
.section {
  margin-bottom: 64px;
}

.line {
  margin-bottom: 12px;
}

.gold {
  color: #C8A24A;
}

.underline {
  border-bottom: 2px solid #EAEAEA;
  display: inline-block;
}

a {
  color: #EAEAEA;
  text-decoration: none;
  border-bottom: 1px solid #C8A24A;
}
</style>
</head>

<body>

<div class="title">Justification Review Standard</div>
<div class="jrs">JRS<span class="tm">TM</span></div>

<div class="section">
  <div class="line">Protect humans.</div>
  <div class="line">Stand on business.</div>
  <div class="line">Apply the <span class="gold">standard</span>.</div>
</div>

<div class="section">
