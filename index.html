<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Justification Review Standard (JRS™)</title>
<meta name="description" content="A documentation review process for evaluating identifiable support for conclusions within organizational records.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">

<style>

:root{
  --bg:#000;
  --surface:#0E0E0E;
  --rule:#1F1F1F;
  --text:#ECECEC;
  --muted:#9A9A9A;
  --muted-soft:#707070;
  --accent:#A88B46;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
}

.container{
  max-width:820px;
  margin:0 auto;
  padding:56px 28px 90px;
}

/* HEADER */

.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:24px;
  border-bottom:1px solid var(--rule);
  padding-bottom:18px;
  margin-bottom:42px;
  flex-wrap:wrap;
}

.wordmark{
  font-family:'Bodoni Moda',serif;
  font-size:30px;
  font-weight:500;
  color:var(--text);
  line-height:1;
}

.wordmark .tm{
  font-size:11px;
  vertical-align:super;
}

.header-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted-soft);
  line-height:1.7;
  text-align:right;
}

/* TITLE */

.doc-title{
  font-family:'Bodoni Moda',serif;
  font-size:42px;
  font-weight:400;
  line-height:1.08;
  margin-bottom:16px;
  letter-spacing:-0.01em;
}

.doc-subtitle{
  font-size:17px;
  color:var(--muted);
  max-width:640px;
  margin-bottom:34px;
}

/* CONTROL BLOCK */

.control-block{
  border:1px solid var(--rule);
  background:var(--surface);
  padding:20px 24px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px 26px;
  margin-bottom:54px;
}

.control-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:.24em;
  color:var(--muted-soft);
  margin-bottom:5px;
}

.control-value{
  font-size:14px;
  color:var(--text);
}

/* SECTIONS */

.section{
  margin-bottom:46px;
}

.section-title{
  font-family:'Inter',sans-serif;
  font-size:15px;
  font-weight:600;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--rule);
  color:var(--text);
}

.section p{
  font-size:15.5px;
  margin-bottom:12px;
  color:var(--text);
}

.section p:last-child{
  margin-bottom:0;
}

/* CONDITIONS */

.conditions{
  margin-top:16px;
}

.condition{
  display:grid;
  grid-template-columns:40px 1fr;
  gap:16px;
  padding:16px 0;
  border-top:1px solid #161616;
}

.condition:last-child{
  border-bottom:1px solid #161616;
}

.condition-number{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--muted);
  padding-top:2px;
}

.condition-title{
  font-size:15px;
  font-weight:600;
  margin-bottom:4px;
}

.condition-text{
  font-size:14.5px;
  color:var(--muted);
}

/* LISTS */

.simple-list{
  margin-top:10px;
}

.simple-item{
  padding:11px 0;
  border-bottom:1px solid #161616;
  font-size:15px;
  color:var(--text);
}

.simple-item:first-child{
  border-top:1px solid #161616;
}

/* NOTE */

.note{
  border-left:2px solid var(--accent);
  padding:14px 18px;
  background:var(--surface);
  margin-top:18px;
  font-size:15px;
  color:var(--text);
}

/* BUTTONS */

.cta-row{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:13px 24px;
  border-radius:2px;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  transition:.2s ease;
}

.btn-primary{
  background:#EAEAEA;
  color:#000;
}

.btn-secondary{
  border:1px solid var(--rule);
  color:var(--text);
}

/* FOOTER */

.footer{
  margin-top:72px;
  padding-top:22px;
  border-top:1px solid var(--rule);
  font-size:11px;
  color:var(--muted-soft);
  line-height:1.8;
}

/* MOBILE */

@media(max-width:720px){

  .container{
    padding:38px 20px 70px;
  }

  .doc-title{
    font-size:38px;
  }

  .control-block{
    grid-template-columns:1fr;
  }

  .header-meta{
    text-align:left;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->

  <div class="header">

    <div class="wordmark">
      JRS<span class="tm">™</span>
    </div>

    <div class="header-meta">
      Standard 001<br>
      Version 1.0 · Effective May 2026
    </div>

  </div>

  <!-- HERO -->

  <h1 class="doc-title">
    Justification Review Standard (JRS™)
  </h1>

  <div class="doc-subtitle">
    Documentation Review Process
  </div>

  <!-- CONTROL BLOCK -->

  <div class="control-block">

    <div>
      <div class="control-label">Version</div>
      <div class="control-value">1.0</div>
    </div>

    <div>
      <div class="control-label">Effective</div>
      <div class="control-value">May 2026</div>
    </div>

  </
